---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-api
  namespace: agents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-api-role
rules:
# Agent CRD access
- apiGroups: ["agents.near.ai"]
  resources: ["agents"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Pod logs for agent debugging
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-api-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-api-role
subjects:
- kind: ServiceAccount
  name: agent-api
  namespace: agents
