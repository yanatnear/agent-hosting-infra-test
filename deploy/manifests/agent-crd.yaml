apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agents.agents.near.ai
spec:
  group: agents.near.ai
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    singular: agent
    shortNames:
      - ag
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: Agent represents a sandboxed NEAR AI agent instance.
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  description: Container image for the agent environment.
                cpu:
                  type: string
                  description: CPU resource request/limit (e.g. "1", "500m").
                  default: "1"
                memory:
                  type: string
                  description: Memory resource request/limit (e.g. "512Mi", "4Gi").
                  default: "4Gi"
                disk:
                  type: string
                  description: Persistent disk size (e.g. "10Gi").
                  default: "10Gi"
                state:
                  type: string
                  description: Desired state of the agent.
                  enum:
                    - running
                    - stopped
                  default: running
                env:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - value
                    properties:
                      name:
                        type: string
                      value:
                        type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  description: Current phase of the agent lifecycle.
                hostNode:
                  type: string
                  description: Name of the Kubernetes node running this agent.
                podIP:
                  type: string
                  description: Cluster-internal IP of the agent pod.
                sshPort:
                  type: integer
                  description: Allocated SSH port for external access.
                restartCount:
                  type: integer
                  description: Number of times the agent pod has been restarted.
                lastBackup:
                  type: string
                  format: date-time
                  description: Timestamp of the last successful volume backup.
                message:
                  type: string
                  description: Human-readable message about the current status.
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .spec.state
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Node
          type: string
          jsonPath: .status.hostNode
          priority: 1
        - name: IP
          type: string
          jsonPath: .status.podIP
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
