---
# MinIO credentials secret
# IMPORTANT: Change these values in production and use sealed-secrets or external-secrets.
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: agents
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: nearai-agents
type: Opaque
stringData:
  root-user: "minioadmin"
  root-password: "minioadmin-secret-change-me"

---
# PVC for MinIO data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: agents
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: nearai-agents
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi

---
# MinIO StatefulSet (single node MVP)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: agents
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: nearai-agents
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/part-of: nearai-agents
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          command:
            - minio
            - server
            - /data
            - "--console-address=:9001"
          ports:
            - name: api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data

---
# MinIO Service (API)
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: agents
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/part-of: nearai-agents
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: api
      port: 9000
      targetPort: api
      protocol: TCP
    - name: console
      port: 9001
      targetPort: console
      protocol: TCP
