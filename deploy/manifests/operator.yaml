---
# ServiceAccount for the agent operator
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-operator
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-operator
    app.kubernetes.io/part-of: nearai-agents

---
# ClusterRole with full permissions to manage agent-related resources
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-operator
  labels:
    app.kubernetes.io/name: agent-operator
    app.kubernetes.io/part-of: nearai-agents
rules:
  # Agent custom resources
  - apiGroups: ["agents.near.ai"]
    resources: ["agents", "agents/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Pods
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ConfigMaps and Secrets
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Events
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Nodes (read-only, for placement decisions)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # Leases for leader election (kube-rs)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # NetworkPolicies
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # CRDs (for self-registration)
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # RuntimeClasses (read-only)
  - apiGroups: ["node.k8s.io"]
    resources: ["runtimeclasses"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-operator
  labels:
    app.kubernetes.io/name: agent-operator
    app.kubernetes.io/part-of: nearai-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-operator
subjects:
  - kind: ServiceAccount
    name: agent-operator
    namespace: agents

---
# Deployment (single replica with leader election)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-operator
  namespace: agents
  labels:
    app.kubernetes.io/name: agent-operator
    app.kubernetes.io/part-of: nearai-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-operator
        app.kubernetes.io/part-of: nearai-agents
    spec:
      serviceAccountName: agent-operator
      containers:
        - name: operator
          image: ghcr.io/nearai/agent-operator:latest
          env:
            - name: RUST_LOG
              value: "info"
            # Leader election is handled by kube-rs using the Lease API.
            # The lease name and namespace are configured here.
            - name: LEADER_ELECTION_LEASE_NAME
              value: "agent-operator-leader"
            - name: LEADER_ELECTION_LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
